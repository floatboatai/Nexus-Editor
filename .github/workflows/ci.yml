name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish packages to npm"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.15.4"

jobs:
  verify:
    name: Test and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Install Playwright browsers
        run: pnpm --filter @floatboat/nexus-electron-demo exec playwright install --with-deps chromium

      - name: Run Electron demo E2E tests
        run: pnpm test:e2e

      # Stability gate: each scenario runs 3× with no retries allowed.
      # Retries are disabled so nondeterministic failures are never silently
      # swallowed — a flaky test must fail here before it can reach release.
      - name: Run E2E stability gate (3× repeat, no retries)
        run: pnpm test:e2e:stability

      - name: Generate eval report
        if: always()
        run: pnpm --filter @floatboat/nexus-electron-demo run generate-eval-report

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: apps/electron-demo/test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Build packages
        run: pnpm build

      - name: Build Electron demo
        run: pnpm build:electron-demo

  publish:
    name: Publish Packages
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Configure npm auth
        run: npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
        env:
          NPM_TOKEN: ${{ secrets.NPM_KEY }}

      - name: Publish packages
        run: pnpm publish:packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_KEY }}
